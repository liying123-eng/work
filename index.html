<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答案之书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        .title h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ffd700, #ff6b6b, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .title p {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
        }

        .question-area {
            width: 100%;
            margin-bottom: 40px;
            z-index: 10;
        }

        .question-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .question-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .touch-area {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.2), rgba(196,69,105,0.3));
            border: 3px solid rgba(255,215,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            touch-action: none;
        }

        .touch-area.pressing {
            transform: scale(0.95);
            border-color: #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.4);
        }

        .energy-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.5);
            opacity: 0;
        }

        .touch-area.pressing .energy-ring {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .center-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .touch-text {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
        }

        .touch-hint {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }

        .answer-display {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s;
        }

        .answer-display.show {
            opacity: 1;
            visibility: visible;
        }

        .answer-book {
            width: 300px;
            height: 400px;
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1a2e 100%);
            border-radius: 10px;
            border: 3px solid #ffd700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }

        .answer-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .answer-text {
            font-size: 1.5rem;
            color: #ffd700;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .answer-meaning {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }

        .close-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .hint {
            margin-top: 40px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="title">
            <h1>📖 答案之书</h1>
            <p>心中默念你的问题，长按获取答案</p>
        </div>

        <div class="question-area">
            <input type="text" class="question-input" id="question" placeholder="在这里输入你的问题（可选）...">
        </div>

        <div class="touch-area" id="touchArea">
            <div class="energy-ring"></div>
            <div class="center-icon">🔮</div>
            <div class="touch-text">长按获取答案</div>
            <div class="touch-hint">按住 3 秒</div>
        </div>

        <div class="hint">💫 肯定50% · 模棱两可30% · 负面20%</div>
    </div>

    <div class="answer-display" id="answerDisplay">
        <div class="answer-book">
            <div class="answer-icon" id="answerIcon">✨</div>
            <div class="answer-text" id="answerText"></div>
            <div class="answer-meaning" id="answerMeaning"></div>
        </div>
        <button class="close-btn" onclick="closeAnswer()">再问一次</button>
    </div>

    <script>
        // 答案库：肯定50% + 模棱两可30% + 负面20%
        const answers = [
            // ===== 肯定/积极 50%（20个）=====
            { text: '是的', icon: '☀️', meaning: '时机已经成熟，勇敢去做吧。宇宙在支持你。', type: 'positive' },
            { text: '大胆去做', icon: '🚀', meaning: '冒险是成长的必经之路。勇敢迈出那一步。', type: 'positive' },
            { text: '机会难得', icon: '💎', meaning: '机不可失，时不再来。抓住眼前的机会。', type: 'positive' },
            { text: '全力以赴', icon: '🔥', meaning: '投入你所有的热情，结果不会辜负你。', type: 'positive' },
            { text: '相信自己', icon: '💪', meaning: '你比想象中更强大。答案就在你心中。', type: 'positive' },
            { text: '马上行动', icon: '⏩', meaning: '拖延是失败的开始，现在就去做。', type: 'positive' },
            { text: '会有惊喜', icon: '🎁', meaning: '意想不到的好事即将发生，保持期待。', type: 'positive' },
            { text: '会有贵人', icon: '👼', meaning: '冥冥之中自有安排，会有人伸出援手。', type: 'positive' },
            { text: '值得投资', icon: '💰', meaning: '时间、金钱或感情，这份投入会有回报。', type: 'positive' },
            { text: '一帆风顺', icon: '⛵', meaning: '天时地利人和，这次会格外顺利。', type: 'positive' },
            { text: '会有回报', icon: '🌾', meaning: '一分耕耘一分收获，你的努力不会白费。', type: 'positive' },
            { text: '尝试新事物', icon: '🌈', meaning: '走出舒适区，你会发现新的可能。', type: 'positive' },
            { text: '展示自己', icon: '🦚', meaning: '是金子就要发光，让世界看到你的才华。', type: 'positive' },
            { text: '坚持己见', icon: '🗿', meaning: '你的判断是正确的，不要被他人左右。', type: 'positive' },
            { text: '重新开始', icon: '🌅', meaning: '结束也是开始，放下过去，迎接新生。', type: 'positive' },
            { text: '就是现在', icon: '⚡', meaning: '最好的时机就是当下，不要等待完美时刻。', type: 'positive' },
            { text: '放手一搏', icon: '🎲', meaning: '人生能有几回搏，不试试怎么知道不行。', type: 'positive' },
            { text: '勇往直前', icon: '🦁', meaning: '勇气不是没有恐惧，而是带着恐惧依然前行。', type: 'positive' },
            { text: '梦想成真', icon: '✨', meaning: '你的愿望正在显化，保持信念。', type: 'positive' },
            { text: '趁热打铁', icon: '🔨', meaning: ' momentum 正好，一鼓作气完成它。', type: 'positive' },
            
            // ===== 模棱两可/哲理 30%（12个）=====
            { text: '一切都是最好的安排', icon: '☯️', meaning: '当下的困惑，或许是未来的礼物。看似的失去，可能是另一种得到。', type: 'philosophy' },
            { text: '塞翁失马，焉知非福', icon: '🐴', meaning: '眼前的得失不必太过执着，福祸相依，转机往往藏在意外之中。', type: 'philosophy' },
            { text: '顺其自然', icon: '🌊', meaning: '强求不得，随遇而安。最好的安排正在发生。', type: 'philosophy' },
            { text: '船到桥头自然直', icon: '🚢', meaning: '过度担忧未来只会消耗当下。水到绝境是风景，人到绝境是重生。', type: 'philosophy' },
            { text: '跟随内心', icon: '❤️', meaning: '理智分析再多，不如听从内心的声音。', type: 'philosophy' },
            { text: '专注当下', icon: '🎯', meaning: '过去已逝，未来未至，活在当下最重要。', type: 'philosophy' },
            { text: '难得糊涂', icon: '😌', meaning: '太清醒的人活得太累。有时候，装傻是一种智慧。', type: 'philosophy' },
            { text: '知足常乐', icon: '😊', meaning: '欲望是无底洞，知足才能常乐。珍惜拥有的，放下执念的。', type: 'philosophy' },
            { text: '否极泰来', icon: '🌅', meaning: '坏到极致就会变好，黑暗之后必是黎明。坚持住，转机快到了。', type: 'philosophy' },
            { text: '韬光养晦', icon: '💎', meaning: '光芒太盛易折，才华太露易妒。藏锋守拙，等待时机。', type: 'philosophy' },
            { text: '知行合一', icon: '🎯', meaning: '知道和做到之间，隔着千山万水。想都是问题，做才有答案。', type: 'philosophy' },
            { text: '上善若水', icon: '💧', meaning: '水善利万物而不争。柔软胜刚强，包容得人心。', type: 'philosophy' },
            
            // ===== 负面/谨慎 20%（8个）=====
            { text: '还不是时候', icon: '⏰', meaning: '准备还不够充分，再给自己一些时间。', type: 'negative' },
            { text: '再等等', icon: '🌙', meaning: '耐心是一种智慧。现在不是最好的时机，静候佳音。', type: 'negative' },
            { text: '需要谨慎', icon: '⚠️', meaning: '小心驶得万年船，多观察，少行动。', type: 'negative' },
            { text: '暂时放下', icon: '🍃', meaning: '有些东西需要放下，才能迎接更好的。顺其自然。', type: 'negative' },
            { text: '保持现状', icon: '🛡️', meaning: '现在很好，不需要改变。稳定也是一种幸福。', type: 'negative' },
            { text: '及时止损', icon: '✂️', meaning: '沉没成本不是成本，及时退出是明智的。', type: 'negative' },
            { text: '改变方向', icon: '🧭', meaning: '此路不通，换个角度思考，会有新的发现。', type: 'negative' },
            { text: '不要强求', icon: '🕊️', meaning: '属于你的终会到来，不属于你的强求不得。', type: 'negative' }
        ];

        // 生成星空
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // 触摸交互
        const touchArea = document.getElementById('touchArea');
        let pressTimer;
        let isPressing = false;
        const PRESS_DURATION = 3000;

        function startPress(e) {
            e.preventDefault();
            if (isPressing) return;
            isPressing = true;
            touchArea.classList.add('pressing');
            pressTimer = setTimeout(() => {
                showAnswer();
                endPress();
            }, PRESS_DURATION);
        }

        function endPress() {
            isPressing = false;
            touchArea.classList.remove('pressing');
            clearTimeout(pressTimer);
        }

        touchArea.addEventListener('mousedown', startPress);
        touchArea.addEventListener('mouseup', endPress);
        touchArea.addEventListener('mouseleave', endPress);
        touchArea.addEventListener('touchstart', startPress);
        touchArea.addEventListener('touchend', endPress);
        touchArea.addEventListener('touchcancel', endPress);

        function showAnswer() {
            const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
            document.getElementById('answerIcon').textContent = randomAnswer.icon;
            document.getElementById('answerText').textContent = randomAnswer.text;
            document.getElementById('answerMeaning').textContent = randomAnswer.meaning;
            document.getElementById('answerDisplay').classList.add('show');
        }

        function closeAnswer() {
            document.getElementById('answerDisplay').classList.remove('show');
            document.getElementById('question').value = '';
        }

        document.addEventListener('touchmove', function(e) {
            if (isPressing) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
